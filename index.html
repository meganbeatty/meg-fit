<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Meg's Fit" />
<meta name="theme-color" content="#FF6B6B" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23FF6B6B'/><text x='90' y='125' font-size='96' text-anchor='middle'>🔥</text></svg>" />
<title>Meg's Fit</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --primary: #FF6B6B;
  --primary-dark: #e85555;
  --accent: #FF8E53;
  --grad: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
  --bg: #ffffff;
  --card: #F8FAFC;
  --border: #E2E8F0;
  --text: #1E293B;
  --muted: #64748B;
  --success: #10B981;
  --success-bg: #ECFDF5;
  --warn: #F59E0B;
  --nav-h: 72px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; color: var(--text); overscroll-behavior: none; }

#app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }

/* ── PANELS ─────────────────────────────────── */
.tab-panel { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); }
.tab-panel.active { display: block; }

/* ── BOTTOM NAV ──────────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: #fff;
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; border: none; background: none; cursor: pointer; padding: 8px 0;
  color: var(--muted); transition: color .2s;
}
.nav-btn.active { color: var(--primary); }
.nav-btn svg { width: 24px; height: 24px; }
.nav-label { font-size: 11px; font-weight: 600; letter-spacing: .3px; }

/* ── HEADER ──────────────────────────────────── */
.page-header {
  background: var(--grad);
  color: white;
  padding: 20px 20px 24px;
  position: relative;
}
.page-header h1 { font-size: 22px; font-weight: 700; line-height: 1.2; }
.page-header .sub { font-size: 14px; opacity: .85; margin-top: 4px; font-weight: 500; }
.page-header .phase-badge {
  display: inline-block; background: rgba(255,255,255,.25);
  border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600;
  margin-top: 10px; letter-spacing: .3px;
}

/* ── CARDS / SECTIONS ────────────────────────── */
.section { margin: 14px 16px 0; }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px 12px; border-bottom: 1px solid var(--border);
  background: #fff;
}
.card-header .icon { font-size: 18px; }
.card-header h2 { font-size: 15px; font-weight: 700; flex: 1; }
.card-header .badge {
  background: var(--grad); color: white; font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
}
.card-body { padding: 14px 16px; }

/* ── SUPPS ───────────────────────────────────── */
.supp-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.supp-item:last-child { border-bottom: none; padding-bottom: 0; }
.supp-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--grad); margin-top: 5px; flex-shrink: 0;
}
.supp-name { font-size: 14px; font-weight: 600; color: var(--text); }
.supp-timing { font-size: 12px; color: var(--muted); margin-top: 2px; }
.supp-reta .supp-dot { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
.supp-reta .supp-name { color: #7c3aed; }

/* ── WORKOUT CHECKLIST ───────────────────────── */
.warmup-bar {
  background: linear-gradient(135deg, #FEF3C7, #FDE68A);
  border-radius: 10px; padding: 10px 14px; margin-bottom: 12px;
  font-size: 13px; color: #92400E; font-weight: 500;
  display: flex; align-items: flex-start; gap: 8px;
}
.section-divider {
  font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
  letter-spacing: .8px; margin: 14px 0 8px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.exercise-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
  transition: opacity .2s;
}
.exercise-item:last-child { border-bottom: none; }
.exercise-item.checked { opacity: .45; }
.exercise-item.checked .ex-name { text-decoration: line-through; }
.ex-check {
  width: 24px; height: 24px; border-radius: 7px; border: 2px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s; background: #fff;
}
.ex-check.checked { background: var(--grad); border-color: transparent; }
.ex-check svg { display: none; }
.ex-check.checked svg { display: block; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.ex-sets { font-size: 12px; color: var(--muted); margin-top: 2px; }
.ex-note { font-size: 11px; color: var(--warn); margin-top: 2px; font-weight: 500; }
.ex-weight {
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.ex-weight input {
  width: 58px; height: 36px; border: 1.5px solid var(--border); border-radius: 10px;
  text-align: center; font-size: 15px; font-weight: 600; color: var(--text);
  background: #fff; padding: 0 4px; -webkit-appearance: none;
  appearance: none;
}
.ex-weight input:focus { outline: none; border-color: var(--primary); }
.ex-weight label { font-size: 11px; color: var(--muted); font-weight: 500; }

.hotworx-card, .rest-card {
  border-radius: 14px; padding: 20px 16px; text-align: center; margin-top: 4px;
}
.hotworx-card { background: linear-gradient(135deg, #FFF1F2, #FFE4E6); }
.rest-card { background: linear-gradient(135deg, #F0F9FF, #E0F2FE); }
.day-emoji { font-size: 40px; margin-bottom: 8px; }
.day-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.day-desc { font-size: 14px; color: var(--muted); line-height: 1.5; }

.week-note {
  background: linear-gradient(135deg, #F0FDF4, #DCFCE7);
  border-radius: 10px; padding: 10px 14px; margin-bottom: 12px;
  font-size: 13px; color: #166534; font-weight: 500;
}

/* ── PROTEIN TRACKER ─────────────────────────── */
.protein-display {
  text-align: center; padding: 16px 16px 8px;
}
.protein-total { font-size: 44px; font-weight: 800; color: var(--text); line-height: 1; }
.protein-total span { font-size: 22px; font-weight: 500; color: var(--muted); }
.protein-label { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 500; }
.progress-bar {
  height: 8px; background: var(--border); border-radius: 99px; margin: 12px 16px 0;
  overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--grad); border-radius: 99px;
  transition: width .4s cubic-bezier(.34,1.56,.64,1);
}
.protein-entries {
  padding: 10px 16px 0; max-height: 110px; overflow-y: auto;
}
.protein-entry {
  display: flex; justify-content: space-between;
  font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border);
  color: var(--text);
}
.protein-entry:last-child { border-bottom: none; }
.protein-entry .ent-time { color: var(--muted); }
.protein-input-area { padding: 12px 16px 4px; }
.protein-preview {
  text-align: center; font-size: 28px; font-weight: 700; color: var(--text);
  min-height: 40px; line-height: 40px; letter-spacing: .5px;
}
.protein-preview.empty { color: var(--border); }
.numpad {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;
}
.numpad-btn {
  height: 52px; border-radius: 14px; border: 1.5px solid var(--border);
  font-size: 20px; font-weight: 600; color: var(--text); background: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .1s; -webkit-user-select: none; user-select: none;
  active-scale: .95;
}
.numpad-btn:active { transform: scale(.93); background: var(--card); }
.numpad-btn.add-btn {
  background: var(--grad); color: white; border-color: transparent; font-size: 15px;
}
.numpad-btn.add-btn:active { opacity: .85; transform: scale(.95); }
.numpad-btn.del-btn { font-size: 18px; }

/* ── NOTES ───────────────────────────────────── */
.notes-textarea {
  width: 100%; border: none; background: transparent; resize: none;
  font-size: 14px; color: var(--text); font-family: inherit; line-height: 1.6;
  min-height: 80px; outline: none;
}
.notes-textarea::placeholder { color: var(--border); }

/* ── LOG TAB ─────────────────────────────────── */
.log-header { background: var(--grad); color: white; padding: 24px 20px 20px; }
.log-header h1 { font-size: 24px; font-weight: 800; }
.log-header p { font-size: 14px; opacity: .8; margin-top: 4px; }
.log-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.log-empty .emoji { font-size: 48px; margin-bottom: 12px; }
.log-group { margin: 14px 16px 0; }
.log-group-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
.log-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 8px;
}
.log-ex-name { font-size: 14px; font-weight: 600; }
.log-ex-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
.log-weight-val { font-size: 22px; font-weight: 800; color: var(--primary); }
.log-weight-unit { font-size: 12px; color: var(--muted); font-weight: 500; }

/* ── AI CHAT TAB ─────────────────────────────── */
.ai-header { background: var(--grad); color: white; padding: 20px 20px 16px; display: flex; align-items: center; gap: 12px; }
.ai-header h1 { font-size: 20px; font-weight: 800; flex: 1; }
.ai-settings-btn { background: rgba(255,255,255,.2); border: none; color: white; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  padding-bottom: 120px;
}
.msg { display: flex; flex-direction: column; max-width: 85%; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.assistant { align-self: flex-start; align-items: flex-start; }
.msg-bubble {
  padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-word;
}
.msg.user .msg-bubble { background: var(--grad); color: white; border-bottom-right-radius: 4px; }
.msg.assistant .msg-bubble { background: var(--card); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
.msg-time { font-size: 11px; color: var(--muted); margin-top: 4px; }
.typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
.typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); animation: bounce .6s infinite alternate; }
.typing-dot:nth-child(2) { animation-delay: .15s; }
.typing-dot:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { from { transform: translateY(0); opacity: .5; } to { transform: translateY(-6px); opacity: 1; } }

.chat-input-wrap {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 16px calc(var(--nav-h) + var(--safe-bottom) + 4px);
  background: #fff; border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: flex-end;
  z-index: 50;
}
.chat-input {
  flex: 1; border: 1.5px solid var(--border); border-radius: 22px;
  padding: 10px 16px; font-size: 15px; font-family: inherit;
  resize: none; max-height: 100px; min-height: 40px; outline: none;
  line-height: 1.4; background: var(--card); color: var(--text);
}
.chat-input:focus { border-color: var(--primary); }
.chat-send {
  width: 40px; height: 40px; border-radius: 50%; background: var(--grad); border: none;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  flex-shrink: 0; transition: opacity .2s;
}
.chat-send:disabled { opacity: .4; }
.chat-send svg { width: 18px; height: 18px; }

/* ── SETTINGS OVERLAY ────────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
  display: flex; align-items: flex-end; padding-bottom: var(--safe-bottom);
}
.overlay.hidden { display: none; }
.overlay-sheet {
  background: white; border-radius: 24px 24px 0 0; padding: 24px 20px 32px; width: 100%;
}
.overlay-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 20px; }
.overlay-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.overlay-sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
.field-label { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.api-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 12px;
  padding: 12px 16px; font-size: 15px; font-family: monospace; color: var(--text);
  outline: none; background: var(--card); margin-bottom: 16px;
}
.api-input:focus { border-color: var(--primary); }
.btn-primary {
  width: 100%; height: 52px; background: var(--grad); color: white; border: none;
  border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer;
  transition: opacity .2s;
}
.btn-primary:active { opacity: .85; }
.btn-secondary {
  width: 100%; height: 44px; background: transparent; color: var(--muted); border: none;
  font-size: 14px; cursor: pointer; margin-top: 8px;
}

.no-workout { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 15px; }
</style>
</head>
<body>
<div id="app">

  <!-- TODAY TAB -->
  <div id="tab-today" class="tab-panel active">
    <div id="today-content"></div>
  </div>

  <!-- LOG TAB -->
  <div id="tab-log" class="tab-panel">
    <div id="log-content"></div>
  </div>

  <!-- ASK AI TAB -->
  <div id="tab-ai" class="tab-panel">
    <div class="ai-header">
      <div>
        <h1>Ask AI</h1>
        <div style="font-size:13px;opacity:.8;margin-top:2px">Your personal trainer</div>
      </div>
      <button class="ai-settings-btn" onclick="openSettings()">API Key</button>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-wrap">
      <textarea id="chat-input" class="chat-input" placeholder="Ask anything about your training…" rows="1" onInput="autoGrow(this)" onKeydown="chatKeydown(event)"></textarea>
      <button class="chat-send" id="chat-send-btn" onclick="sendChat()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="switchTab('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="nav-label">Today</span>
    </button>
    <button class="nav-btn" id="nav-log" onclick="switchTab('log')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span class="nav-label">Log</span>
    </button>
    <button class="nav-btn" id="nav-ai" onclick="switchTab('ai')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="nav-label">Ask AI</span>
    </button>
  </nav>
</div>

<!-- SETTINGS OVERLAY -->
<div id="settings-overlay" class="overlay hidden">
  <div class="overlay-sheet">
    <div class="overlay-handle"></div>
    <div class="overlay-title">Anthropic API Key</div>
    <div class="overlay-sub">Your key is stored only on this device. It's used to power the AI training assistant.</div>
    <div class="field-label">API Key</div>
    <input type="password" id="api-key-input" class="api-input" placeholder="sk-ant-..." />
    <button class="btn-primary" onclick="saveApiKey()">Save Key</button>
    <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// WORKOUT DATA
// ═══════════════════════════════════════════════

  SB_DELOAD: {

const PROGRAM_START = new Date('2026-05-04T12:00:00');
const SPECIAL = {
  '2026-05-01': { type:'LIFT', workout: W.RAMP_IN, showWarmup: true },
  '2026-05-02': { type:'HOTWORX', name:'Hot Yoga / Hot ISO', desc:'Hot yoga or hot ISO — 30 min · Replenish electrolytes', emoji:'🔥' },
  '2026-05-03': { type:'REST', name:'Rest Day', desc:'Full rest · Eat well, hit protein target, sleep', emoji:'💤' },
  '2026-06-12': { type:'TAPER', name:'Taper Rest', desc:'Taper rest — no lifting, no HIIT. Arrive at your honeymoon feeling fresh.', emoji:'🤍' },
  '2026-06-13': { type:'TAPER', name:'Taper Rest', desc:'Taper rest — no lifting, no HIIT. Arrive at your honeymoon feeling fresh.', emoji:'🤍' },
};

function weekNum(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const diff = Math.floor((d - PROGRAM_START) / 86400000);
  if (diff < 0) return 0;
  return Math.floor(diff / 7) + 1;
}

function getRetaDose(wk) {
  if (wk <= 2) return '0.5mg';
  if (wk <= 4) return '0.75mg';
  return '1.0mg';
}

function getDayInfo(dateStr) {
  if (SPECIAL[dateStr]) return SPECIAL[dateStr];

  const d = new Date(dateStr + 'T12:00:00');
  const dow = d.getDay(); // 0=Sun
  const wk = weekNum(dateStr);

  if (wk < 1 || wk > 6) return null;

  const isPeak = wk >= 5;
  const isDeload = wk === 4;

  // Sunday: REST
  if (dow === 0) return { type:'REST', name:'Rest Day', desc:'Easy walk optional · Infrared sauna optional · Real recovery', emoji:'💤' };

  // Saturday: HOTWORX (all weeks)
  if (dow === 6) {
    const desc = (wk >= 5)
      ? 'Hot HIIT — 30-40 min · Max effort · Force protein post-session'
      : 'Hot HIIT — 30-40 min · Force protein within 30 min post-session · Replenish electrolytes';
    return { type:'HOTWORX', name:'Hot HIIT', desc, emoji:'🔥' };
  }

  // Tuesday: HOTWORX weeks 1-4, REST weeks 5-6
  if (dow === 2) {
    if (isPeak) return { type:'REST', name:'Rest Day', desc:'Full rest · Easy walk optional · Infrared sauna optional', emoji:'💤' };
    const w1note = wk === 1 ? ' (optional this week)' : wk === 2 ? ' (mandatory this week)' : '';
    return { type:'HOTWORX', name:'Hot Yoga / Hot ISO', desc:`Hot Yoga or Hot ISO — 30-40 min${w1note} · Replenish electrolytes`, emoji:'🧘‍♀️' };
  }

  // Lift days: Mon, Wed, Thu, Fri
  let workout, showWarmup = true, weekNote = null;

  if (dow === 1) { // Monday
    workout = isPeak ? W.GH_PEAK : isDeload ? W.GH_DELOAD : W.GH_BASE;
    if (wk === 3) weekNote = 'Week 3 intensification — supersets on lower days, increase load 5-10% vs W1-2';
  } else if (dow === 3) { // Wednesday
    workout = isPeak ? W.SB_PEAK : isDeload ? W.SB_DELOAD : W.SB_BASE;
    if (wk === 3) weekNote = 'Week 3 intensification — supersets on lower days, increase load 5-10%';
  } else if (dow === 4) { // Thursday
    workout = isPeak ? W.QA_PEAK : isDeload ? W.QA_DELOAD : W.QA_BASE;
    if (wk === 3) weekNote = 'Week 3 intensification — supersets on lower days, increase load 5-10%';
  } else if (dow === 5) { // Friday
    workout = isPeak ? W.AC_PEAK : isDeload ? W.AC_DELOAD : W.AC_BASE;
  }

  if (!workout) return null;

  return { type:'LIFT', workout, showWarmup, weekNote, week: wk };
}

// UTILITIES

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}

function fmtTime(ts) {
  const d = new Date(ts);
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')}${ampm}`;
}

function isLiftDay(dayInfo) {
  return dayInfo && dayInfo.type === 'LIFT';
}
function isMonday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.getDay() === 1;
}

// LS helpers
function lsGet(k, def = null) { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch { return def; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

  const workoutLabel = dayInfo

function renderWorkoutSection(date, dayInfo) {
  if (!dayInfo) return '';

  let inner = '';

  if (dayInfo.type === 'HOTWORX') {
    inner = `
      <div class="hotworx-card">
        <div class="day-emoji">${dayInfo.emoji}</div>
        <div class="day-title">${dayInfo.name}</div>
        <div class="day-desc">${dayInfo.desc}</div>
      </div>`;
  } else if (dayInfo.type === 'REST' || dayInfo.type === 'TAPER') {
    inner = `
      <div class="rest-card">
        <div class="day-emoji">${dayInfo.emoji}</div>
        <div class="day-title">${dayInfo.name}</div>
        <div class="day-desc">${dayInfo.desc}</div>
      </div>`;
  } else if (dayInfo.type === 'LIFT') {
    const checks = lsGet(`checks_${date}`, []);
    const weights = {}; // loaded per exercise below

    if (dayInfo.showWarmup) {
      inner += `<div class="warmup-bar"><span>🏃‍♀️</span><span>${WARMUP}</span></div>`;
    }
    if (dayInfo.weekNote) {
      inner += `<div class="week-note">⚡ ${dayInfo.weekNote}</div>`;
    }
    if (dayInfo.workout.note) {
      inner += `<div class="week-note">ℹ️ ${dayInfo.workout.note}</div>`;
    }

    const exercises = dayInfo.workout.exercises;
    let mainExes = exercises.filter(e => !e.isAb && !e.isGlute);
    let abExes = exercises.filter(e => e.isAb);
    let gluteExes = exercises.filter(e => e.isGlute);

    function exRow(ex) {
      const checked = checks.includes(ex.id);
      const w = lsGet(`weight_${ex.id}`, {weight:'', updatedAt:''});
      return `
        <div class="exercise-item ${checked ? 'checked' : ''}" data-id="${ex.id}">
          <div class="ex-check ${checked ? 'checked' : ''}" data-check="${ex.id}">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2 7 5.5 10.5 12 3.5"/>
            </svg>
          </div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sets">${ex.sets}</div>
            ${ex.note ? `<div class="ex-note">★ ${ex.note}</div>` : ''}
          </div>
          <div class="ex-weight">
            <input type="number" inputmode="decimal" placeholder="—" value="${w.weight || ''}" data-ex="${ex.id}" class="weight-input" />
            <label>lbs</label>
          </div>
        </div>`;
    }

    inner += mainExes.map(exRow).join('');
    if (abExes.length) {
      inner += `<div class="section-divider">AB CIRCUIT / FINISHER</div>`;
      inner += abExes.map(exRow).join('');
    }
    if (gluteExes.length) {
      inner += `<div class="section-divider">GLUTE FINISHER</div>`;
      inner += gluteExes.map(exRow).join('');
    }
  }

  return `
    <div class="section">
      <div class="card">
        <div class="card-header">
          <span class="icon">${dayInfo.type === 'LIFT' ? '🏋️‍♀️' : dayInfo.type === 'HOTWORX' ? '🔥' : '😴'}</span>
          <h2>Workout</h2>
        </div>
        <div class="card-body">${inner}</div>
      </div>
    </div>
  `;
}

function attachWorkoutHandlers(date, dayInfo) {
  if (!isLiftDay(dayInfo)) return;

  // Checkbox toggles
  document.querySelectorAll('[data-check]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.check;
      const checks = lsGet(`checks_${date}`, []);
      const idx = checks.indexOf(id);
      if (idx === -1) checks.push(id); else checks.splice(idx, 1);
      lsSet(`checks_${date}`, checks);
      const item = btn.closest('.exercise-item');
      const checked = checks.includes(id);
      btn.classList.toggle('checked', checked);
      item.classList.toggle('checked', checked);
    });
  });

  // Weight inputs
  let debounceTimers = {};
  document.querySelectorAll('.weight-input').forEach(input => {
    input.addEventListener('input', () => {
      const id = input.dataset.ex;
      clearTimeout(debounceTimers[id]);
      debounceTimers[id] = setTimeout(() => {
        const val = input.value.trim();
        if (val !== '') {
          lsSet(`weight_${id}`, { weight: val, updatedAt: todayStr() });
        }
      }, 600);
    });
  });
}

            <button class="numpad-btn" onclick="numTap('6')">6</button>
            <button class="numpad-btn" onclick="numTap('1')">1</button>
            <button class="numpad-btn" onclick="numTap('2')">2</button>
            <button class="numpad-btn" onclick="numTap('3')">3</button>
            <button class="numpad-btn del-btn" onclick="numTap('del')">⌫</button>
            <button class="numpad-btn" onclick="numTap('0')">0</button>
            <button class="numpad-btn add-btn" onclick="numTap('add')">Add</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function attachProteinHandlers(date) {
  // Handled via global numTap function, date captured via closure trick
  window._proteinDate = date;
}

function numTap(val) {
  const date = window._proteinDate || todayStr();
  if (val === 'del') {
    proteinInput = proteinInput.slice(0, -1);
  } else if (val === 'add') {
    const amt = parseInt(proteinInput, 10);
    if (amt > 0) {
      const data = lsGet(`protein_${date}`, { total: 0, entries: [] });
      data.total += amt;
      data.entries.push({ amount: amt, ts: Date.now() });
      lsSet(`protein_${date}`, data);
      proteinInput = '';
      // Update UI without full re-render
      const pct = Math.min(100, Math.round((data.total / 130) * 100));
      const totalEl = document.getElementById('protein-total');
      const barEl = document.getElementById('protein-bar');
      const entriesEl = document.getElementById('protein-entries');
      if (totalEl) totalEl.innerHTML = `${data.total}<span>g / 130g</span>`;
      if (barEl) barEl.style.width = pct + '%';
      if (entriesEl) {
        const entries = [...data.entries].reverse().map(e =>
          `<div class="protein-entry"><span>${e.amount}g</span><span class="ent-time">${fmtTime(e.ts)}</span></div>`
        ).join('');
        entriesEl.innerHTML = entries;
      }
    } else {
      proteinInput = '';
    }
  } else {
    if (proteinInput.length >= 4) return;
    proteinInput += val;
  }
  const preview = document.getElementById('protein-preview');
  if (preview) {
    preview.textContent = proteinInput || '0';
    preview.classList.toggle('empty', !proteinInput);
  }
}

function renderLog() {
  const el = document.getElementById('log-content');

  // Gather all saved weights
  const allExercises = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('weight_')) {
      const id = key.slice(7);
      const data = lsGet(key, {});
      if (data && data.weight) {
        allExercises.push({ id, weight: data.weight, updatedAt: data.updatedAt });
      }
    }
  }

  let html = `
    <div class="log-header">
      <h1>Weight Log</h1>
      <p>Last recorded weight per exercise</p>
    </div>
  `;

  if (!allExercises.length) {
    html += `
      <div class="log-empty">
        <div class="emoji">📋</div>
        <div>No weights logged yet.<br>Start a workout to begin tracking.</div>
      </div>`;
    el.innerHTML = html;
    return;
  }

  // Build exercise name map
  const nameMap = {};
  const allW = [W.RAMP_IN, W.GH_BASE, W.GH_DELOAD, W.GH_PEAK, W.SB_BASE, W.SB_DELOAD, W.SB_PEAK,
                W.QA_BASE, W.QA_DELOAD, W.QA_PEAK, W.AC_BASE, W.AC_DELOAD, W.AC_PEAK];
  allW.forEach(w => w.exercises.forEach(e => { nameMap[e.id] = e.name; }));

  allExercises.sort((a, b) => (nameMap[a.id] || a.id).localeCompare(nameMap[b.id] || b.id));

  html += `<div class="log-group"><div class="log-group-title">All Exercises</div>`;
  allExercises.forEach(ex => {
    const name = nameMap[ex.id] || ex.id.replace(/_/g, ' ');
    const dateLabel = ex.updatedAt ? fmtDate(ex.updatedAt) : '';
    html += `
      <div class="log-item">
        <div>
          <div class="log-ex-name">${name}</div>
          ${dateLabel ? `<div class="log-ex-date">${dateLabel}</div>` : ''}
        </div>
        <div style="text-align:right">
          <div class="log-weight-val">${ex.weight}</div>
          <div class="log-weight-unit">lbs</div>
        </div>
      </div>`;
  });
  html += '</div>';

  el.innerHTML = html;
}

function getChatHistory(date) {
  return lsGet(`chat_${date}`, []);
}
function saveChatHistory(date, msgs) {
  lsSet(`chat_${date}`, msgs);
}

function renderChat() {
  const date = todayStr();
  const msgs = getChatHistory(date);
  const el = document.getElementById('chat-messages');
  if (!el) return;

  if (!msgs.length) {
    el.innerHTML = `<div style="text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;line-height:1.6">
      Ask anything about your training, nutrition, peptides, or recovery.<br><br>
      <span style="font-size:28px">💪</span>
    </div>`;
    return;
  }

  el.innerHTML = msgs.map(m => `
    <div class="msg ${m.role}">
      <div class="msg-bubble">${escHtml(m.content)}</div>
      ${m.ts ? `<div class="msg-time">${fmtTime(m.ts)}</div>` : ''}
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  const sendBtn = document.getElementById('chat-send-btn');
  if (sendBtn) sendBtn.disabled = !el.value.trim();
}

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  const apiKey = lsGet('anthropic_api_key', null);
  if (!apiKey) {
    openSettings();
    return;
  }

  const date = todayStr();
  const msgs = getChatHistory(date);
  msgs.push({ role: 'user', content: text, ts: Date.now() });
  saveChatHistory(date, msgs);

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('chat-send-btn').disabled = true;

  renderChat();
  const chatEl = document.getElementById('chat-messages');

  // Show typing indicator
  const typingEl = document.createElement('div');
  typingEl.className = 'msg assistant';
  typingEl.id = 'typing';
  typingEl.innerHTML = `<div class="msg-bubble" style="padding:8px 14px">
    <div class="typing-indicator">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
  </div>`;
  chatEl.appendChild(typingEl);
  chatEl.scrollTo(0, chatEl.scrollHeight);

  try {
    const apiMsgs = msgs.slice(-20).map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content }));

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: apiMsgs,
      }),
    });

    const data = await res.json();
    typingEl.remove();

    if (data.error) throw new Error(data.error.message);

    const reply = data.content[0].text;
    msgs.push({ role: 'assistant', content: reply, ts: Date.now() });
    saveChatHistory(date, msgs);
    renderChat();
    chatEl.scrollTo(0, chatEl.scrollHeight);
  } catch (err) {
    typingEl.remove();
    const errEl = document.createElement('div');
    errEl.className = 'msg assistant';
    errEl.innerHTML = `<div class="msg-bubble" style="color:#ef4444">Error: ${escHtml(err.message)}</div>`;
    chatEl.appendChild(errEl);
    chatEl.scrollTo(0, chatEl.scrollHeight);
  }
}

function openSettings() {
  const overlay = document.getElementById('settings-overlay');
  const input = document.getElementById('api-key-input');
  const saved = lsGet('anthropic_api_key', '');
  if (saved) input.value = saved;
  overlay.classList.remove('hidden');
  setTimeout(() => input.focus(), 100);
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.add('hidden');
}

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (val) {
    lsSet('anthropic_api_key', val);
    closeSettings();
  }
}

document.getElementById('settings-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('settings-overlay')) closeSettings();
});
